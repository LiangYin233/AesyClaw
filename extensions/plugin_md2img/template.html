<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background: #f5f7fb
        }

        body {
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-start
        }

        @font-face {
            font-family: "SourceHanSerifSC";
            src: url(data:font/woff2;base64,{{fontBase64}}) format("woff2");
            font-weight: 200 900;
            font-style: normal;
            font-display: block
        }

        #md2img-root {
            display: flex;
            flex-direction: column;
            width: 680px;
            box-sizing: border-box;
            padding: 28px 32px;
            background: #ffffff;
            font-size: 16px;
            line-height: 1.75;
            color: #1f2328;
            word-break: break-word;
            overflow-wrap: anywhere;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08)
        }
    </style>
</head>

<body>
    <div id="md2img-root"
        style="font-family:'SourceHanSerifSC','Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
        {{content}}</div>
</body>

</html>
