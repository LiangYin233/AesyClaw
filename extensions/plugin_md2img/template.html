<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #f3efe4;
      }

      body {
        padding: 32px 24px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      @font-face {
        font-family: 'SourceHanSerifSC';
        src: url(data:font/woff2;base64,{{fontBase64}}) format('woff2');
        font-weight: 200 900;
        font-style: normal;
        font-display: block;
      }

      #md2img-root {
        display: flex;
        flex-direction: column;
        width: 680px;
        box-sizing: border-box;
        padding: 40px 48px;
        background: #fffdf6;
        font-size: 16.5px;
        line-height: 1.85;
        color: #2c2a26;
        word-break: break-word;
        overflow-wrap: anywhere;
        border-radius: 6px;
        box-shadow:
          0 2px 12px rgba(60, 50, 30, 0.06),
          0 8px 40px rgba(60, 50, 30, 0.04);
        font-family: 'SourceHanSerifSC', 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
        letter-spacing: 0.02em;
      }

      /* Typography */
      #md2img-root h1,
      #md2img-root h2,
      #md2img-root h3,
      #md2img-root h4,
      #md2img-root h5,
      #md2img-root h6 {
        font-weight: 700;
        color: #1a1917;
        margin-top: 1.6em;
        margin-bottom: 0.6em;
        line-height: 1.35;
        letter-spacing: 0.04em;
      }

      #md2img-root h1 {
        font-size: 1.85em;
        text-align: center;
        margin-top: 0.2em;
        margin-bottom: 1em;
        padding-bottom: 0.5em;
        border-bottom: 1px solid #e8e2d4;
        font-weight: 800;
      }

      #md2img-root h2 {
        font-size: 1.45em;
        margin-top: 1.8em;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #ede8db;
      }

      #md2img-root h3 {
        font-size: 1.2em;
        color: #3d3a34;
      }

      #md2img-root h4 {
        font-size: 1.05em;
        color: #4a4740;
      }

      #md2img-root p {
        margin: 0.8em 0;
        text-align: justify;
        text-indent: 2em;
      }

      #md2img-root p:first-of-type {
        text-indent: 0;
      }

      /* Lists */
      #md2img-root ul,
      #md2img-root ol {
        padding-left: 2em;
        margin: 0.6em 0;
      }

      #md2img-root li {
        margin: 0.35em 0;
        text-align: justify;
      }

      /* Blockquote */
      #md2img-root blockquote {
        margin: 1.2em 0;
        padding: 0.8em 1.2em;
        background: #f9f6ef;
        border-left: 3px solid #c4b9a3;
        color: #5a554d;
        font-style: italic;
        border-radius: 0 4px 4px 0;
      }

      #md2img-root blockquote p {
        text-indent: 0;
        margin: 0.4em 0;
      }

      #md2img-root blockquote p:first-child {
        margin-top: 0;
      }

      #md2img-root blockquote p:last-child {
        margin-bottom: 0;
      }

      /* Code */
      #md2img-root code {
        font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
        background: #f2efe8;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-size: 0.88em;
        color: #5c5346;
        letter-spacing: 0;
      }

      #md2img-root pre {
        background: #f5f2ea;
        padding: 1em 1.2em;
        border-radius: 4px;
        overflow-x: auto;
        margin: 1em 0;
        border: 1px solid #ebe6da;
      }

      #md2img-root pre code {
        background: transparent;
        padding: 0;
        font-size: 0.85em;
        line-height: 1.6;
        color: #4a453d;
      }

      /* Links */
      #md2img-root a {
        color: #8a7e68;
        text-decoration: none;
        border-bottom: 1px solid #d4cdb8;
        transition:
          border-color 0.2s,
          color 0.2s;
      }

      #md2img-root a:hover {
        color: #6b5f4a;
        border-bottom-color: #6b5f4a;
      }

      /* Horizontal Rule */
      #md2img-root hr {
        border: none;
        border-top: 1px solid #e2dbd0;
        margin: 2em 5em;
        position: relative;
      }

      #md2img-root hr::after {
        content: '· · ·';
        position: absolute;
        left: 50%;
        top: -0.6em;
        transform: translateX(-50%);
        background: #fffdf6;
        padding: 0 0.8em;
        color: #c4b9a3;
        font-size: 0.85em;
        letter-spacing: 0.2em;
      }

      /* Images */
      #md2img-root img {
        max-width: 100%;
        border-radius: 4px;
        display: block;
        margin: 1.2em auto;
        box-shadow: 0 2px 8px rgba(60, 50, 30, 0.08);
      }

      /* Tables */
      #md2img-root table {
        width: 100%;
        border-collapse: collapse;
        margin: 1em 0;
        font-size: 0.95em;
      }

      #md2img-root th,
      #md2img-root td {
        border: 1px solid #e2dbd0;
        padding: 0.5em 0.8em;
        text-align: left;
      }

      #md2img-root th {
        background: #f5f2ea;
        font-weight: 600;
        color: #3d3a34;
      }

      #md2img-root tr:nth-child(even) {
        background: #faf8f3;
      }

      /* Selection */
      #md2img-root ::selection {
        background: #e8dfd0;
        color: #2c2a26;
      }
    </style>
  </head>

  <body>
    <div id="md2img-root">{{content}}</div>
  </body>
</html>
